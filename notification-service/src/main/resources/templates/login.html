<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #5a67d8; }
        .error { color: red; margin-bottom: 15px; }
        .info { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Вход в систему</h2>
    <div th:if="${param.error}" class="error">Неверное имя пользователя или пароль</div>
    <div th:if="${param.logout}" class="error" style="color: green;">Вы вышли из системы</div>
    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Логин" required autofocus>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
    </form>
    <div class="info">Тестовые данные: demo / demo123</div>
</div>
</body>
</html>
