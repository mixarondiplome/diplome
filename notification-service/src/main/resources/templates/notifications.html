<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Сервис уведомлений - мониторинг в реальном времени</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 10px;
            border-left: 4px solid #28a745;
        }
        .stat-card span {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
        }
        .notifications-table {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #343a40;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #dee2e6;
        }
        tr:hover {
            background: #f8f9fa;
            transition: 0.3s;
        }
        .timestamp {
            font-family: monospace;
            font-size: 12px;
            color: #6c757d;
        }
        .transaction-id {
            font-family: monospace;
            font-size: 13px;
            color: #007bff;
        }
        .amount {
            font-weight: bold;
            color: #28a745;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        .auto-refresh {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            display: inline-block;
            margin-left: 20px;
        }
        .refresh-control {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .badge {
            background: #17a2b8;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Сервис уведомлений - мониторинг</h1>
        <p>Уведомления о транзакциях в реальном времени из топика Kafka: <strong>transaction-events</strong></p>

        <div class="stats">
            <div class="stat-card">
                Получено: <span id="totalCount">0</span>
            </div>
            <div class="stat-card">
                Автообновление: <span id="refreshStatus">каждую секунду</span>
            </div>
        </div>

        <div class="refresh-control">
            <button onclick="refreshData()">Обновить сейчас</button>
            <label>
                <input type="checkbox" id="autoRefresh" checked> Автообновление (1 сек)
            </label>
        </div>
    </div>

    <div class="notifications-table">
        <table>
            <thead>
            <tr>
                <th>Время</th>
                <th>ID транзакции</th>
                <th>ID пользователя</th>
                <th>Сумма</th>
                <th>Валюта</th>
                <th>Статус</th>
            </tr>
            </thead>
            <tbody id="notificationsBody">
            <tr>
                <td colspan="6" class="loading">Загрузка уведомлений...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let totalReceived = 0;

    async function refreshData() {
        try {
            console.log('Загрузка данных...');
            const response = await fetch('/api/notifications/recent');
            const notifications = await response.json();

            console.log('Полученные данные:', notifications);

            const tbody = document.getElementById('notificationsBody');

            if (!notifications || notifications.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">Нет уведомлений. Отправьте транзакцию из главного сервиса!</td></tr>';
                document.getElementById('totalCount').innerText = '0';
                return;
            }

            totalReceived = notifications.length;
            document.getElementById('totalCount').innerText = totalReceived;

            tbody.innerHTML = notifications.map(notif => {
                let timestamp = notif.timestamp;
                if (typeof timestamp === 'string') {
                    timestamp = parseInt(timestamp);
                }
                const now = Date.now();
                if (timestamp > now + 86400000) {
                    timestamp = now;
                }

                let transactionId = notif.transactionId || notif.transaction_id || 'unknown';
                transactionId = transactionId.toString();

                let userId = notif.userId || notif.user_id || 'unknown';
                userId = userId.toString();

                let amount = notif.amount;
                if (typeof amount === 'string') {
                    const match = amount.match(/[\d.]+/);
                    amount = match ? parseFloat(match[0]) : 0;
                }
                const amountFormatted = typeof amount === 'number' ? amount.toFixed(2) : '0.00';

                let currency = notif.currency || 'USD';
                if (typeof currency !== 'string') {
                    currency = currency.toString();
                }

                return `
                <tr>
                    <td class="timestamp">${new Date(timestamp).toLocaleString('ru-RU')}</td>
                    <td class="transaction-id">${transactionId.substring(0, 13)}${transactionId.length > 13 ? '...' : ''}</td>
                    <td>${userId}</td>
                    <td class="amount">${amountFormatted}</td>
                    <td><span class="badge">${currency}</span></td>
                    <td style="color: #28a745;">Обработано</td>
                </tr>
            `;
            }).join('');

            const rows = tbody.getElementsByTagName('tr');
            if (rows.length > 0) {
                rows[0].style.backgroundColor = '#d4edda';
                setTimeout(() => {
                    if (rows[0]) rows[0].style.backgroundColor = '';
                }, 500);
            }

        } catch (error) {
            console.error('Ошибка:', error);
            document.getElementById('notificationsBody').innerHTML =
                `<tr><td colspan="6" style="text-align: center; padding: 40px; color: red;">Ошибка загрузки данных: ${error.message}</td></tr>`;
        }
    }

    let intervalId = null;

    function startAutoRefresh() {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(() => {
            if (document.getElementById('autoRefresh').checked) {
                refreshData();
            }
        }, 1000);
    }

    function stopAutoRefresh() {
        if (intervalId) {
            clearInterval(intervalId);
            intervalId = null;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const autoRefreshCheckbox = document.getElementById('autoRefresh');
        if (autoRefreshCheckbox) {
            autoRefreshCheckbox.addEventListener('change', function(e) {
                if (e.target.checked) {
                    startAutoRefresh();
                    document.getElementById('refreshStatus').innerText = 'каждую секунду';
                } else {
                    stopAutoRefresh();
                    document.getElementById('refreshStatus').innerText = 'остановлено';
                }
            });
        }

        startAutoRefresh();
        refreshData();
    });
</script>
</body>
</html>
