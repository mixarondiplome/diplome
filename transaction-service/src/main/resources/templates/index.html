<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Сервис транзакций - Kafka Producer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .card-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: slideIn 0.5s ease-out;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .transaction-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .transaction-info h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            font-family: monospace;
            color: #333;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .services-info {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .services-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .service-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .service-link {
            padding: 10px 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
            transition: all 0.3s;
        }

        .service-link:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>Сервис транзакций</h1>
            <p>Kafka Producer с безопасностью (JWT + TLS + Avro)</p>
        </div>

        <div class="card-body">
            <div id="successAlert" class="alert alert-success"></div>
            <div id="errorAlert" class="alert alert-error"></div>

            <form id="transactionForm">
                <div class="form-group">
                    <label for="userId">Идентификатор пользователя</label>
                    <input type="text" id="userId" name="userId" placeholder="Введите ID пользователя" value="1" required>
                </div>

                <div class="form-group">
                    <label for="amount">Сумма</label>
                    <input type="number" step="0.01" id="amount" name="amount" placeholder="Введите сумму" value="1500.00" required>
                </div>

                <div class="form-group">
                    <label for="currency">Валюта</label>
                    <select id="currency" name="currency">
                        <option value="USD">USD - Доллар США</option>
                        <option value="EUR">EUR - Евро</option>
                        <option value="RUB">RUB - Российский рубль</option>
                        <option value="GBP">GBP - Британский фунт</option>
                        <option value="JPY">JPY - Японская иена</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn">Отправить транзакцию в Kafka</button>
            </form>

            <div id="transactionInfo" class="transaction-info">
                <h3>Последняя отправленная транзакция</h3>
                <div id="transactionDetails"></div>
            </div>
        </div>
    </div>

    <div class="services-info">
        <h3>Мониторинг сервисов обработки</h3>
        <div class="service-links">
            <a href="http://31.177.110.246:8084" target="_blank" class="service-link">
                Сервис уведомлений
            </a>
            <a href="http://31.177.110.246:8086" target="_blank" class="service-link">
                Kafka UI
            </a>
            <a href="http://31.177.110.246:8081" target="_blank" class="service-link">
                Schema Registry
            </a>
        </div>
        <p style="margin-top: 15px; color: #666; font-size: 12px;">
            Архитектура: Kafka (SASL_SSL + OAuthBearer) → Avro + Schema Registry → Потребители
        </p>
    </div>
</div>

<script>
    const form = document.getElementById('transactionForm');
    const submitBtn = document.getElementById('submitBtn');
    const successAlert = document.getElementById('successAlert');
    const errorAlert = document.getElementById('errorAlert');
    const transactionInfo = document.getElementById('transactionInfo');
    const transactionDetails = document.getElementById('transactionDetails');

    function showAlert(element, message, duration = 5000) {
        element.textContent = message;
        element.style.display = 'block';

        setTimeout(() => {
            element.style.display = 'none';
        }, duration);
    }

    function displayTransaction(transaction) {
        const date = new Date(transaction.timestamp);
        transactionDetails.innerHTML = `
                <div class="info-row">
                    <span class="info-label">ID транзакции:</span>
                    <span class="info-value">${String(transaction.transactionId)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">ID пользователя:</span>
                    <span class="info-value">${transaction.userId}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Сумма:</span>
                    <span class="info-value">${transaction.amount} ${transaction.currency}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Время:</span>
                    <span class="info-value">${date.toLocaleString('ru-RU')}</span>
                </div>
            `;
        transactionInfo.style.display = 'block';

        transactionInfo.style.animation = 'none';
        setTimeout(() => {
            transactionInfo.style.animation = 'slideIn 0.5s ease-out';
        }, 10);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = {
            userId: document.getElementById('userId').value,
            amount: parseFloat(document.getElementById('amount').value),
            currency: document.getElementById('currency').value
        };

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Отправка...';

        try {
            const response = await fetch('/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok && result.success) {
                showAlert(successAlert, result.message);
                displayTransaction(result.transaction);

            } else {
                showAlert(errorAlert, result.message || 'Ошибка отправки транзакции');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            showAlert(errorAlert, 'Сетевая ошибка: ' + error.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Отправить транзакцию в Kafka';
        }
    });
</script>
</body>
</html>
