services:
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9093:9093"
      - "9094:9094"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: yrx-T4_QQw-gXh_lmBp3SQ
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094,2@kafka-2:9094,3@kafka-3:9094
      KAFKA_LISTENERS: SSL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: SSL://kafka:9093,CONTROLLER://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SSL:SSL,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: SSL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.jks
      KAFKA_SSL_KEYSTORE_TYPE: JKS
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.keystore.jks
      KAFKA_SSL_KEY_CREDENTIALS: keystore_password.txt
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_password.txt
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: keystore_password.txt

      KAFKA_SSL_KEYSTORE_PASSWORD: confluent
      KAFKA_SSL_KEY_PASSWORD: confluent

      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: confluent

      KAFKA_SSL_CLIENT_AUTH: required
    volumes:
      - ./certs:/etc/kafka/secrets

  kafka-2:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-2
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: yrx-T4_QQw-gXh_lmBp3SQ
      KAFKA_NODE_ID: 2
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094,2@kafka-2:9094,3@kafka-3:9094
      KAFKA_LISTENERS: SSL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: SSL://kafka-2:9093,CONTROLLER://kafka-2:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SSL:SSL,CONTROLLER:PLAINTEXT

      KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.jks
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.truststore.jks
      KAFKA_SSL_KEYSTORE_TYPE: JKS
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: SSL

      KAFKA_SSL_KEY_CREDENTIALS: keystore_password.txt
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_password.txt
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: keystore_password.txt

      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: confluent
      KAFKA_SSL_KEY_PASSWORD: confluent
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: confluent
      KAFKA_SSL_CLIENT_AUTH: required

    volumes:
      - ./certs:/etc/kafka/secrets

  kafka-3:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-3
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: yrx-T4_QQw-gXh_lmBp3SQ
      KAFKA_NODE_ID: 3
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094,2@kafka-2:9094,3@kafka-3:9094
      KAFKA_LISTENERS: SSL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: SSL://kafka-3:9093,CONTROLLER://kafka-3:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SSL:SSL,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: SSL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.jks
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.truststore.jks
      KAFKA_SSL_KEYSTORE_TYPE: JKS

      KAFKA_SSL_KEY_CREDENTIALS: keystore_password.txt
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_password.txt
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: keystore_password.txt

      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.keystore.jks
      KAFKA_SSL_KEYSTORE_PASSWORD: confluent
      KAFKA_SSL_KEY_PASSWORD: confluent
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: confluent
      KAFKA_SSL_CLIENT_AUTH: required

    volumes:
      - ./certs:/etc/kafka/secrets

  create-topics:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - kafka
      - kafka-2
      - kafka-3
    entrypoint: [
      "bash","-c",
      "sleep 12; /usr/bin/kafka-topics --create --topic transaction-events --partitions 8 --replication-factor 3 --config min.insync.replicas=2 --bootstrap-server kafka:9093,kafka-2:9093,kafka-3:9093 --command-config /etc/kafka/secrets/client-ssl.properties || true; echo 'topics created';"
    ]
    volumes:
      - ./certs:/etc/kafka/secrets
      - ./client-ssl.properties:/etc/kafka/secrets/client-ssl.properties
    restart: "no"

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: schema-registry
    depends_on:
      - kafka
      - create-topics
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: https://0.0.0.0:8081
      SCHEMA_REGISTRY_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.keystore.jks
      SCHEMA_REGISTRY_SSL_KEYSTORE_PASSWORD: confluent
      SCHEMA_REGISTRY_SSL_KEY_PASSWORD: confluent
      SCHEMA_REGISTRY_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      SCHEMA_REGISTRY_SSL_TRUSTSTORE_PASSWORD: confluent
      SCHEMA_REGISTRY_LISTENER_SCHEMES: https
      SCHEMA_REGISTRY_INTER_INSTANCE_PROTOCOL: https

      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: SSL://kafka:9093,SSL://kafka-2:9093,SSL://kafka-3:9093
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SSL
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.truststore.jks
      SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_PASSWORD: confluent
      SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.keystore.jks
      SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_PASSWORD: confluent
      SCHEMA_REGISTRY_KAFKASTORE_SSL_KEY_PASSWORD: confluent
    volumes:
      - ./certs:/etc/kafka/secrets

  postgres:
    image: postgres:15
    container_name: audit-postgres
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit_db
    volumes:
      - audit_data:/var/lib/postgresql/data

  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    container_name: transaction-service
    depends_on:
      - schema-registry
      - create-topics
    environment:
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - ./certs:/app/certs
    ports:
      - "8083:8083"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      - create-topics
      - schema-registry
    environment:
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - ./certs:/app/certs
    ports:
      - "8084:8084"

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    container_name: audit-service
    depends_on:
      - create-topics
      - schema-registry
    environment:
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - ./certs:/app/certs
    ports:
      - "8085:8085"

volumes:
  audit_data: